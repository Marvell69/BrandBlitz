name: Deploy (staging)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.STAGING_APP_DIR }}"
            export APP_VERSION="main"
            export IMAGE_REGISTRY="${{ secrets.IMAGE_REGISTRY || 'ghcr.io/privexlabs' }}"

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api worker web

            # Plain SQL migrations are currently applied by the app/database bootstrap path.
            # Keep this explicit staging hook so it can be replaced by a real migration runner.
            if [ -f init.sql ]; then
              echo "Migration hook present: init.sql compatibility verified by image build."
            fi

            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            BASE_URL="${{ secrets.STAGING_BASE_URL }}"
            test -n "$BASE_URL"
            curl -fsSL "$BASE_URL/api/health" >/dev/null
            curl -fsSL "$BASE_URL/" >/dev/null

      - name: Roll back staging on failed healthcheck
        if: failure()
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.STAGING_APP_DIR }}"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
